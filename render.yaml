services:
  # Web Service
  - type: web
    name: coffeeapp
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: coffeeapp-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: MAILER_SENDER
        sync: false
      - key: MAILER_HOST
        sync: false
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: PORT
        value: 10000

databases:
  # PostgreSQL Database
  - name: coffeeapp-db
    databaseName: coffee_db
    plan: free
    region: oregon
    postgresMajorVersion: 16
